<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #74b9ff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-bottom: 30px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

            input::placeholder {
                color: rgba(255,255,255,0.3);
            }

            input:focus {
                border-color: #74b9ff;
            }

        button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

            button:hover {
                opacity: 0.85;
            }

            button:active {
                transform: scale(0.97);
            }

            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

        .result {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            font-size: 15px;
            line-height: 1.8;
            min-height: 80px;
            white-space: pre-wrap;
            color: rgba(255,255,255,0.85);
            display: none;
        }

        .loading {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            display: none;
            margin-bottom: 10px;
        }

        .error {
            color: #ff7675;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤 Hava Durumu AI</h1>
        <p class="subtitle">Semantic Kernel + llama3.2 + OpenWeatherMap</p>

        <div class="input-row">
            <input type="text"
                   id="question"
                   placeholder="Örn: Manisa'da hava nasıl?"
                   onkeydown="if(event.key==='Enter') sorcua()" />
            <button id="btn" onclick="sorcua()">Sor</button>
        </div>

        <div class="loading" id="loading">⏳ Yanıt bekleniyor...</div>
        <div class="error" id="error"></div>
        <div class="result" id="result"></div>
    </div>

    <script>
        async function sorcua() {
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            btn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';
            error.style.display = 'none';

            try {
                const response = await fetch('/api/weather/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) throw new Error('Sunucu hatası: ' + response.status);

                const data = await response.json();
                result.textContent = data.answer;
                result.style.display = 'block';

            } catch (err) {
                error.textContent = '❌ Hata: ' + err.message;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
